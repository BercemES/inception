version: '3.8'

services:
  nginx:
    depends_on:
      - wordpress
    build: requirements/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/wordpress
    networks:
      - inception
    restart: unless-stopped

  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    networks:
      - inception
    volumes:
      - db_data:/var/lib/mysql
    environment:
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
    secrets:
      - db_root_password
      - db_password
    restart: unless-stopped

  wordpress:
    depends_on:
      - mariadb
    build: requirements/wordpress
    container_name: wordpress
    volumes:
      - wp_data:/var/www/wordpress
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: ${DB_DATABASE}
      WORDPRESS_DB_USER: ${DB_USER}
      WP_ROOT_USER: ${WP_ROOT_USER}
      WP_ROOT_EMAIL: ${WP_ROOT_EMAIL}
    secrets:
      - db_password
      - wp_root_password
    networks:
      - inception
    restart: unless-stopped

networks:
  inception:
    driver: bridge

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      device: /home/bekinci-/sgoinfre/data/mariadb
      o: "bind"
  wp_data:
    driver: local
    driver_opts:
      type: none
      device: /home/bekinci-/sgoinfre/data/wordpress
      o: "bind"
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_root_password:
    file: ../secrets/credentials.txt